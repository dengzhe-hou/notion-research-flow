  <text x="500" y="66" text-anchor="middle" fill="#a0aec0" font-size="14">Claude Code + Notion MCP  —  Automated Research Paper Library</text>
  <line x1="150" y1="80" x2="850" y2="80" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>

  <!-- ════════ CARD 1: arXiv ════════ -->
  <rect x="28" y="92" width="242" height="368" fill="url(#c1)" rx="14" filter="url(#sh)"/>
  <rect x="28" y="92" width="242" height="368" fill="none" stroke="#fc6161" stroke-width="1.5" rx="14" opacity="0.7"/>
  <rect x="28" y="92" width="242" height="4" fill="#fc6161" rx="2"/>

  <!-- arXiv doc stack -->
  <rect x="115" y="110" width="70" height="88" fill="#7f1d1d" rx="6" opacity="0.45" transform="rotate(-7,150,154)"/>
  <rect x="115" y="110" width="70" height="88" fill="#991b1b" rx="6" opacity="0.65" transform="rotate(-3,150,154)"/>
  <rect x="112" y="108" width="70" height="88" fill="#dc2626" rx="6" filter="url(#gr)"/>
  <polygon points="164,108 182,108 182,126" fill="#b91c1c"/>
  <polygon points="164,108 182,126 164,126" fill="#7f1d1d" opacity="0.5"/>
  <text x="128" y="128" fill="#fca5a5" font-size="12" font-weight="700">arXiv</text>
