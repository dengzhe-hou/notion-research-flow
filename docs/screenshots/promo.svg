  <rect x="740" y="238" width="222" height="16" fill="#071c2c" rx="2"/>
  <rect x="740" y="238" width="3" height="16" fill="#3b82f6"/>
  <text x="748" y="249" fill="#e2e8f0" font-size="8">EcoThink Green Inference</text>
