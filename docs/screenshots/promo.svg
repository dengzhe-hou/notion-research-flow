  <rect x="360" y="92" width="280" height="368" fill="url(#c2)" rx="14" filter="url(#sh)"/>
  <rect x="360" y="92" width="280" height="368" fill="none" stroke="#9b8df8" stroke-width="2" rx="14" opacity="0.8" filter="url(#gp)"/>
