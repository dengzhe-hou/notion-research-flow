  <rect x="122" y="150" width="38" height="4" fill="#fff" opacity="0.45" rx="2"/>
  <rect x="122" y="162" width="44" height="4" fill="#fff" opacity="0.45" rx="2"/>
  <rect x="122" y="174" width="32" height="4" fill="#fff" opacity="0.35" rx="2"/>

  <text x="149" y="224" text-anchor="middle" fill="#fc6161" font-size="18" font-weight="700">arXiv Search</text>
