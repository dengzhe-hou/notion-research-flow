<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1e3a"/>
      <stop offset="100%" stop-color="#1a2040"/>
    </linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1a1a"/>
      <stop offset="100%" stop-color="#2a1010"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#251d50"/>
      <stop offset="100%" stop-color="#1c1640"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2d44"/>
      <stop offset="100%" stop-color="#0a1f30"/>
    </linearGradient>
    <filter id="gr"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gp"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gb"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#8b7cf8"/>
    </marker>
  </defs>

  <!-- BG -->
  <rect width="1000" height="500" fill="url(#bg)"/>
  <circle cx="500" cy="250" r="380" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.05"/>

