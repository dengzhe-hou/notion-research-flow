  <rect x="930" y="240" width="26" height="12" fill="#052e16" rx="6"/>
  <text x="943" y="249" text-anchor="middle" fill="#4ade80" font-size="8">New</text>

  <text x="851" y="270" text-anchor="middle" fill="#4b5563" font-size="10">+ 9 more papers...</text>

  <text x="851" y="302" text-anchor="middle" fill="#56c8f0" font-size="18" font-weight="700">Notion Library</text>
