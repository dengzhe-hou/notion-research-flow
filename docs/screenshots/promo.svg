  <text x="748" y="213" fill="#e2e8f0" font-size="8">NeuroNarrator Foundation</text>
  <text x="894" y="213" fill="#b8a9fc" font-size="9" font-weight="700">8.9</text>
  <rect x="930" y="204" width="26" height="12" fill="#052e16" rx="6"/>
  <text x="943" y="213" text-anchor="middle" fill="#4ade80" font-size="8">New</text>

