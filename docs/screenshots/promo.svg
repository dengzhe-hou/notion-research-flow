  <rect x="42" y="344" width="214" height="36" fill="#200c0c" rx="8"/>
  <text x="56" y="366" fill="#9ca3af" font-size="12">Categories</text>
  <text x="246" y="366" text-anchor="end" fill="#fca5a5" font-size="12" font-weight="600">cs.AI / cs.LG / cs.CL</text>

  <rect x="42" y="386" width="214" height="36" fill="#200c0c" rx="8"/>
  <text x="56" y="408" fill="#9ca3af" font-size="12">Dedup</text>
