  <text x="894" y="231" fill="#b8a9fc" font-size="9" font-weight="700">8.3</text>
  <rect x="930" y="222" width="26" height="12" fill="#052e16" rx="6"/>
  <text x="943" y="231" text-anchor="middle" fill="#4ade80" font-size="8">New</text>

